# Set prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Sync panes
bind y set-window-option synchronize-panes on
bind u set-window-option synchronize-panes off

# Start numerotation with 1 instead of 0
setw -g base-index 1
set -g renumber-windows on

# Vim mode
setw -g mode-keys vi

# Display popup
bind p display-popup

# Increase tmux history from 2k to 3k lines
set -g history-limit 25000

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Disable oh-my-zsh automatic window renaming
set -g allow-rename off
set -g automatic-rename off
set -g set-titles off

# Change status line position 
# set-option -g status-position top
set-option -g status-position bottom 

# Options to make tmux more pleasant
set -g default-terminal "tmux-256color"

# ── Plugins (managed by TPM — https://github.com/tmux-plugins/tpm) ────────────
# Install:  <prefix> + I      Update:  <prefix> + U      Remove:  <prefix> + alt + u
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'
# To pin a version, append a ref, e.g.:  set -g @plugin 'catppuccin/tmux#v2.1.3'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
# NB: no leading space — catppuccin's "rounded" middle separator is already a
# space, so a leading space here renders as a doubled gap after the number.
set -g @catppuccin_window_text " #W "
set -g @catppuccin_window_current_text " #W "
set -g @catppuccin_window_default_fill "number"

# Load catppuccin now so the @catppuccin_status_* modules are defined before we
# build the status line below. (On first run, before plugins are installed,
# these run lines harmlessly no-op; `install.sh` installs the plugins for you.)
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Make the status line pretty and add some modules. -F on the cpu/battery
# modules force-expands @catppuccin_status_cpu → "#{cpu_percentage}" into the
# value now, so the tmux-cpu/-battery plugins (loaded just below) can swap in
# the live readings.
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Load cpu/battery after the status line so they substitute their placeholders.
run ~/.tmux/plugins/tmux-cpu/cpu.tmux
run ~/.tmux/plugins/tmux-battery/battery.tmux

# Initialize TPM (plugin install/update) — keep this line at the very bottom.
run '~/.tmux/plugins/tpm/tpm'

# Rename the current window in a floating popup instead of the status-line
# prompt. The themed status bar (with live cpu/battery #() modules) redraws on
# an interval and repaints the window list over an inline prompt, causing the
# overlap/"zszsh" artifact. A popup is independent of the status line, so it
# can't be overdrawn. Empty input keeps the current name.
bind , display-popup -E -w 44 -h 3 -T ' rename window ' \
  'printf "rename to: "; read -r n; tmux rename-window -- "${n:-#W}"'
